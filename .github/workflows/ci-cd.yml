name: CI/CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 784038766309
  S3_BUCKET: sales-forecast-api-artifacts-bernardo
  ECR_REPOSITORY: portfolio/sales-forecast-api

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::784038766309:role/SalesForecastGitHubRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }} .

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag Docker image
        run: |
          docker tag \
            ${{ env.ECR_REPOSITORY }} \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
      
      - name: Push Docker image
        run: |
          docker push \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

      - name: Upload docker-compose.yml to S3
        run: |
          aws s3 cp docker-compose.yml s3://${{ env.S3_BUCKET }}/deploy/docker-compose.yml

      - name: Deploy to EC2 via SSM
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-07edd950df1183359" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Sales Forecast API" \
            --parameters commands='[
              "mkdir -p /home/ubuntu/app",
              "aws s3 cp s3://'"${{ env.S3_BUCKET }}"'/deploy/docker-compose.yml /home/ubuntu/app/docker-compose.yml",
              "aws ecr get-login-password --region '"${{ env.AWS_REGION }}"' | docker login --username AWS --password-stdin '"${{ env.AWS_ACCOUNT_ID }}"'.dkr.ecr.'"${{ env.AWS_REGION }}"'.amazonaws.com",
              "cd /home/ubuntu/app && docker compose pull",
              "docker rm -f sales-api || true",
              "cd /home/ubuntu/app && docker compose up -d",
              "docker image prune -a -f"
            ]' \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment result
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "i-07edd950df1183359"

          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "i-07edd950df1183359"
