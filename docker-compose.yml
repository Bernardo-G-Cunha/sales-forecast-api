services:
  nginx:
    image: 784038766309.dkr.ecr.us-east-1.amazonaws.com/portfolio/sales-forecast-nginx:latest

    container_name: nginx

    restart: unless-stopped

    depends_on:
      - sales-api

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /opt/certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  sales-api:
    image: 784038766309.dkr.ecr.us-east-1.amazonaws.com/portfolio/sales-forecast-api:latest

    container_name: sales-api

    restart: unless-stopped

    expose:
      - "8000"

    environment:
      S3_BUCKET: sales-forecast-api-artifacts-bernardo